<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lollipop Block Blast</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Animated Lollipop Background -->
    <div class="bg-decor candy1"></div>
    <div class="bg-decor candy2"></div>
    <div class="bg-decor candy3"></div>

    <div id="game-wrap">
        <!-- Start Screen -->
        <div id="start-screen" class="glass-overlay">
            <div class="start-box glass-panel-heavy">
                <h1 class="game-logo embossed-text">Lollipop<br>Tetris</h1>
                <p class="sub-text">Xúc cảm pastel – Nhận pizza miễn phí 🍕</p>
                <button id="btn-start" class="btn glass-btn primary bounce pulse">BẮT ĐẦU CHƠI</button>
            </div>
        </div>

        <!-- Game UI Container -->
        <div id="game-ui">
            <!-- Top Header info -->
            <div id="top-bar">
                <div id="top-controls">
                    <button id="btn-pause" class="btn-icon glass-panel" title="Tạm dừng">⏸</button>
                    <button id="btn-restart" class="btn-icon glass-panel" title="Chơi lại">🔄</button>
                    <div class="lives-box glass-panel">❤️ <span id="lives-count">3</span>
                        <div id="life-timer" class="hidden">Hồi sau: 10:00</div>
                    </div>
                </div>
                
                <div class="stat-box glass-panel small-score">
                    <span class="label">ĐIỂM</span>
                    <span id="score" class="value glow-text embossed-text">0</span>
                </div>
            </div>

            <!-- Conversion progress -->
            <div id="reward-progress" class="glass-panel">
                <div class="progress-bar"><div class="fill" id="pizza-fill"></div></div>
                <div class="progress-text" id="pizza-text">Cố lên! Đạt 100 điểm để nhận Pizza 🍕</div>
            </div>

            <!-- Play Area -->
            <div id="play-area">
                <!-- Canvas Container -->
                <div id="canvas-container">
                    <canvas id="game-canvas"></canvas>
                </div>
                
                <!-- Right Side Panel -->
                <div id="right-panel">
                    <div class="next-box glass-panel">
                        <span class="label">KHỐI TIẾP THEO</span>
                        <canvas id="next-canvas" width="70" height="70"></canvas>
                    </div>
                    
                    <div class="inventory-group-vertical glass-panel">
                        <span class="label" style="text-align: center; display: block; width: 100%; margin-bottom: 5px; font-size: 0.9rem; opacity: 0.85; text-shadow: 0 1px 2px rgba(0,0,0,0.2);">KHO QUÀ</span>
                        <div class="inventory-box" id="btn-slow" title="Làm chậm (1 lượt)">⏳ <span class="inv-count" id="inv-slow-count">0</span></div>
                        <div class="inventory-box" id="btn-gift" title="Voucher">🎁 <span class="inv-count" id="inv-gift-count">0</span></div>
                    </div>
                </div>
            </div>
            
            <!-- Floating Text Area -->
            <div id="floating-text-container"></div>
        </div>

        <!-- Popups -->
        <div id="popup-overlay" class="hidden glass-overlay">
            <div id="popup" class="popup-box glass-panel-heavy">
                <h2 id="popup-title">Title</h2>
                <div id="popup-emoji" class="shake-anim">🎉</div>
                <p id="popup-message">Message</p>
                <div id="popup-actions">
                    <button id="btn-continue" class="btn glass-btn primary">Chơi tiếp</button>
                    <button id="btn-ads" class="btn glass-btn secondary hidden">📺 Xem Ads (+1 Mạng)</button>
                    <button id="btn-buy" class="btn glass-btn helper hidden">💎 Mua full mạng</button>
                    <button id="btn-claim-pizza" class="btn glass-btn primary pulse hidden">NHẬN NGAY PIZZA</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
